<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Stats</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:wght@400;700&display=swap"
      rel="stylesheet" />

    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>
    <main>
      <section class="visitors">
        <data value="205">205</data>
        <h2>Current Visitors</h2>
      </section>
      <section class="views">
        <div>
          <img src="./assets/Stack.svg" />
          <div>
            <data value="530.001">530,001</data>
            <h3>Page Views</h3>
          </div>
        </div>
        <div>
          <img src="./assets/User.svg" />
          <div>
            <data value="80.488">80,488</data>
            <h3>Unique Visitors</h3>
          </div>
        </div>
      </section>
      <div class="bottom">
        <button>Launch Live View</button>
        <p>
          <span>Note</span>: You will need the latest version of Google Chrome
          for optimal performance.
        </p>
      </div>
    </main>
  </body>
</html>
